<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>E-Portfolio LA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Fraunces:wght@600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --green-dark:   #1a6b4a;
    --green-mid:    #2d9467;
    --green-light:  #e8f5ef;
    --green-accent: #34c47c;
    --bg:           #f4f7f5;
    --white:        #ffffff;
    --text-dark:    #0f1f18;
    --text-mid:     #4a6358;
    --text-light:   #8aab98;
    --border:       #d6e8de;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .chat-wrapper {
    width: 100%;
    max-width: 460px;
    display: flex;
    flex-direction: column;
    height: 88vh;
    max-height: 700px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow:
      0 2px 4px rgba(26,107,74,0.04),
      0 12px 40px rgba(26,107,74,0.10),
      0 0 0 1px rgba(26,107,74,0.08);
    background: var(--white);
  }

  /* Header */
  .header {
    background: var(--green-dark);
    padding: 18px 22px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    overflow: hidden;
  }

  .header::before {
    content: '';
    position: absolute;
    right: -30px; top: -30px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }

  .header-icon {
    width: 44px; height: 44px;
    background: rgba(255,255,255,0.12);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.15);
  }

  .header-text .title {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: -0.01em;
  }

  .header-text .subtitle {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .online-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green-accent);
    box-shadow: 0 0 0 2px rgba(52,196,124,0.3);
    animation: pulse 2.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 2px rgba(52,196,124,0.3); }
    50%       { box-shadow: 0 0 0 4px rgba(52,196,124,0.1); }
  }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 22px 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    background: var(--bg);
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    animation: rise 0.22s ease;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-row.user { flex-direction: row-reverse; }

  .bubble {
    max-width: 75%;
    padding: 11px 15px;
    font-size: 14px;
    line-height: 1.6;
    font-weight: 400;
    border-radius: 16px;
  }

  .msg-row.bot .bubble {
    background: var(--white);
    color: var(--text-dark);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .msg-row.user .bubble {
    background: var(--green-dark);
    color: #ffffff;
    border-bottom-right-radius: 4px;
  }

  /* Typing indicator */
  .typing-bubble {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    padding: 13px 18px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .typing-bubble span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-light);
    display: inline-block;
    animation: bounce 1.2s infinite;
  }

  .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
  .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30%            { transform: translateY(-5px); opacity: 1; }
  }

  /* Suggestion chips */
  .suggestions {
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .suggestions-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 2px;
  }

  .suggestion-chip {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--green-dark);
    background: var(--green-light);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    width: 100%;
  }

  .suggestion-chip:hover {
    background: var(--green-dark);
    color: #fff;
    border-color: var(--green-dark);
  }

  /* Submit unanswered button */
  .submit-row {
    margin-top: 10px;
  }

  .submit-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-mid);
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 8px;
    padding: 7px 12px;
    cursor: pointer;
    width: 100%;
    text-align: left;
    transition: all 0.15s;
  }

  .submit-btn:hover {
    border-color: var(--green-mid);
    color: var(--green-dark);
    background: var(--green-light);
  }

  /* Loading state */
  .loading-text {
    font-size: 13px;
    color: var(--text-light);
    font-style: italic;
  }

  /* Quick replies */
  .quick-bar {
    padding: 12px 18px;
    background: var(--white);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .quick-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    width: 100%;
  }

  .quick-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--green-dark);
    background: var(--green-light);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 13px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .quick-btn:hover {
    background: var(--green-dark);
    color: #fff;
    border-color: var(--green-dark);
  }

  /* Input */
  .input-area {
    padding: 14px 18px;
    background: var(--white);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
  }

  input {
    flex: 1;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text-dark);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 15px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  input:focus {
    border-color: var(--green-mid);
    background: #fff;
  }

  input::placeholder { color: var(--text-light); }

  .send-btn {
    width: 42px; height: 42px;
    border-radius: 10px;
    background: var(--green-dark);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }

  .send-btn:hover  { background: var(--green-mid); }
  .send-btn:active { transform: scale(0.93); }

  .send-btn svg { width: 16px; height: 16px; fill: #fff; }
</style>
</head>
<body>

<div class="chat-wrapper">

  <div class="header">
    <div class="header-icon">🎓</div>
    <div class="header-text">
      <div class="title">E-Portfolio LA</div>
      <div class="subtitle">
        <span class="online-dot"></span> Online — here to help
      </div>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="msg-row bot">
      <div class="bubble loading-text">Loading questions from server...</div>
    </div>
  </div>

  <div class="quick-bar" id="quickBar">
    <span class="quick-label">Loading...</span>
  </div>

  <div class="input-area">
    <input id="userInput" type="text" placeholder="Ask a question..."
           onkeydown="if(event.key==='Enter') sendMessage()" disabled />
    <button class="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 21l21-9L2 3v7l15 2-15 2z"/>
      </svg>
    </button>
  </div>

</div>

<script>
  // ─── CONFIG ───────────────────────────────────────────────────
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz1CB-cthieXudn3HeOlKuwSNmFQ-ivR93g2EiliBvw9fLhqflNjzvVklxyOy-G2_0/exec";
  const TOP_FALLBACK_COUNT = 3;
  // ──────────────────────────────────────────────────────────────

  let keywordData = []; // loaded from Google Sheets — each row: { kw1, kw2, response }

  // ── Load data from Google Sheets on startup ──────────────────
  async function loadKeywords() {
    try {
      const res = await fetch(APPS_SCRIPT_URL);
      const data = await res.json();

      // Store each row as-is: { kw1, kw2, response }
      keywordData = data.map(row => ({
        kw1: (row.kw1 || '').toString().trim().toLowerCase(),
        kw2: (row.kw2 || '').toString().trim().toLowerCase(),
        response: (row.response || '').toString().trim()
      })).filter(row => row.kw2 && row.response);

      // Clear loading message and show welcome
      const box = document.getElementById('messages');
      box.innerHTML = '';
      addMessage("สวัสดีค่ะ SoLA ยินดีตอบคำถามเกี่ยวกับข้อมูลการประเมินผลการปฏิบัติงานระบบ E-port ค่ะ", 'bot');

      // Build quick reply buttons from first 3 kw2 only entries
      buildQuickBar();

      document.getElementById('userInput').disabled = false;
      document.getElementById('userInput').focus();

    } catch (err) {
      const box = document.getElementById('messages');
      box.innerHTML = '';
      addMessage("⚠️ ไม่สามารถเชื่อมต่อกับ Server ได้ในขณะนี้", 'bot');
      console.error(err);
    }
  }

  function buildQuickBar() {
    const bar = document.getElementById('quickBar');
    // Show first 3 kw2-only entries (no kw1) as quick buttons
    const standalone = keywordData.filter(r => !r.kw1).slice(0, 3);
    bar.innerHTML = '<span class="quick-label">Quick questions</span>' +
      standalone.map(function(r) { return '<button class="quick-btn" onclick="sendHint(\'' + r.kw2 + '\')">'+r.kw2+'</button>'; }).join('');
  }

  // ── Matching logic ───────────────────────────────────────────
  function getWords(str) {
    return str.toLowerCase().split(/\s+/).filter(Boolean);
  }

  function inputContains(input, keyword) {
    if (!keyword) return false;
    return input.toLowerCase().includes(keyword.toLowerCase());
  }

  function getResult(input) {
    const lower = input.toLowerCase();

    // Step 1: Find all kw1 matches in input
    const kw1Matches = [...new Set(
      keywordData
        .map(r => r.kw1)
        .filter(k => k && lower.includes(k))
    )];

    // Step 2: Find all kw2 matches in input
    const kw2Matches = [...new Set(
      keywordData
        .map(r => r.kw2)
        .filter(k => k && lower.includes(k))
    )];

    const hasKw1 = kw1Matches.length > 0;
    const hasKw2 = kw2Matches.length > 0;

    // Case A: kw1 found
    if (hasKw1) {
      if (hasKw2) {
        // Try to find rows matching kw1 + kw2 combination
        const matched = keywordData.filter(r =>
          r.kw1 && kw1Matches.includes(r.kw1) &&
          r.kw2 && kw2Matches.includes(r.kw2)
        );

        if (matched.length === 0) {
          // kw1 found but kw2 doesn't pair with it — ask to clarify
          return { type: 'unclear' };
        }

        if (matched.length === 1) {
          return { type: 'answer', text: matched[0].response };
        }

        // Multiple matches — check unique responses
        const uniqueRes = [...new Set(matched.map(r => r.response))];
        if (uniqueRes.length === 1) {
          return { type: 'answer', text: uniqueRes[0] };
        }

        // Multiple different answers — answer best + show others
        return {
          type: 'multi',
          best: matched[0],
          others: matched.slice(1).filter(r => r.response !== matched[0].response)
        };

      } else {
        // kw1 found but no kw2 — show all related kw2 options
        const related = keywordData.filter(r =>
          r.kw1 && kw1Matches.includes(r.kw1)
        );
        return { type: 'needKw2', related };
      }
    }

    // Case B: No kw1 — look for standalone kw2 (no kw1 required)
    if (hasKw2) {
      const matched = keywordData.filter(r =>
        !r.kw1 && r.kw2 && kw2Matches.includes(r.kw2)
      );

      if (matched.length === 0) {
        // kw2 found but it requires kw1 — ask to clarify
        return { type: 'unclear' };
      }

      if (matched.length === 1) {
        return { type: 'answer', text: matched[0].response };
      }

      const uniqueRes = [...new Set(matched.map(r => r.response))];
      if (uniqueRes.length === 1) {
        return { type: 'answer', text: uniqueRes[0] };
      }

      return {
        type: 'multi',
        best: matched[0],
        others: matched.slice(1).filter(r => r.response !== matched[0].response)
      };
    }

    // Case C: Nothing matched
    return { type: 'fallback' };
  }

  // ── Submit unanswered question to Google Sheets ──────────────
  async function submitUnanswered(question) {
    try {
      await fetch(APPS_SCRIPT_URL + '?action=submit&question=' + encodeURIComponent(question), {
        method: 'GET',
        mode: 'no-cors'
      });
    } catch (err) {
      console.error('Failed to submit unanswered question:', err);
    }
  }

  // ── DOM helpers ──────────────────────────────────────────────
  function scrollBottom() {
    const box = document.getElementById('messages');
    box.scrollTop = box.scrollHeight;
  }

  function addMessage(text, who) {
    const box = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = `msg-row ${who}`;
    row.innerHTML = `<div class="bubble">${text}</div>`;
    box.appendChild(row);
    scrollBottom();
  }

  function showTyping() {
    const box = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    row.id = 'typing-row';
    row.innerHTML = `<div class="typing-bubble"><span></span><span></span><span></span></div>`;
    box.appendChild(row);
    scrollBottom();
  }

  function hideTyping() {
    const el = document.getElementById('typing-row');
    if (el) el.remove();
  }

  function addSuggestions(matches, intro, showSubmit, originalQuestion) {
    const box = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = 'msg-row bot';

    const chips = matches.map(m => {
      const entry = m.entry || m;
      const kws = Array.isArray(entry.keywords) ? entry.keywords : [entry.keyword || ''];
      const kw = kws[0] || '';
      const label = entry.question || kw;
      return `<button class="suggestion-chip" onclick="sendHint('${kw}')">${label}</button>`;
    }).join('');

    const submitHtml = showSubmit
      ? `<div class="submit-row">
           <button class="submit-btn" onclick="handleSubmitUnanswered('${originalQuestion.replace(/'/g, "\\'")}', this)">
             📩 Submit this question to the team
           </button>
         </div>`
      : '';

    row.innerHTML = `
      <div class="bubble">
        ${intro}
        <div class="suggestions">
          <span class="suggestions-label">Suggestions</span>
          ${chips}
        </div>
        ${submitHtml}
      </div>`;
    box.appendChild(row);
    scrollBottom();
  }

  async function handleSubmitUnanswered(question, btn) {
    btn.disabled = true;
    btn.textContent = 'Submitting...';
    await submitUnanswered(question);
    btn.textContent = '✅ Submitted! We\'ll add it soon.';
    btn.style.color = 'var(--green-dark)';
    btn.style.borderColor = 'var(--green-accent)';
  }

  // ── Multi keyword reply ─────────────────────────────────────
  function addMultiReply(others) {
    const box = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = 'msg-row bot';

    let chipsHtml = '';
    if (others && others.length > 0) {
      const chips = others.map(function(m) {
        const kws = Array.isArray(m.keywords) ? m.keywords : [m.keyword || ''];
        const kw = kws[0] || '';
        const label = m.question || kw;
        return '<button class="suggestion-chip" onclick="sendHint(\'' + kw + '\')">' + label + '</button>';
      }).join('');
      chipsHtml = '<div class="suggestions"><span class="suggestions-label">Other questions</span>' + chips + '</div>';
    }

    row.innerHTML = '<div class="bubble">💬 It looks like you asked multiple questions! I\'ve answered the most relevant one. Feel free to ask your other question!' + chipsHtml + '</div>';
    box.appendChild(row);
    box.scrollTop = box.scrollHeight;
  }

  // ── Main send logic ──────────────────────────────────────────
  function sendMessage() {
    const input = document.getElementById('userInput');
    const text  = input.value.trim();
    if (!text || input.disabled) return;

    addMessage(text, 'user');
    input.value = '';
    input.disabled = true;

    showTyping();

    setTimeout(() => {
      hideTyping();
      input.disabled = false;
      input.focus();

      const result = getResult(text);

      if (result.type === 'answer') {
        addMessage(result.text, 'bot');

      } else if (result.type === 'multi') {
        // Answer best match + show others
        addMessage(result.best.response, 'bot');
        addMultiReply(result.others);

      } else if (result.type === 'needKw2') {
        // kw1 found but no kw2 — show related options as chips
        const chips = result.related.map(r =>
          '<button class="suggestion-chip" onclick="sendHint(\'' + r.kw2 + '\')">'+r.kw2+'</button>'
        ).join('');
        const box = document.getElementById('messages');
        const row = document.createElement('div');
        row.className = 'msg-row bot';
        row.innerHTML = '<div class="bubble">ช่วยถามอีกครั้ง โดยให้ข้อมูลเพิ่มเติมทีค่ะ<div class="suggestions"><span class="suggestions-label">Choose one</span>' + chips + '</div></div>';
        box.appendChild(row);
        box.scrollTop = box.scrollHeight;

      } else if (result.type === 'unclear') {
        addMessage("ขออภัยค่ะ ไม่เข้าใจคำถามที่คุณถาม ช่วยถามอีกครั้งค่ะ", 'bot');

      } else {
        const fallback = keywordData.filter(r => !r.kw1).slice(0, TOP_FALLBACK_COUNT);
        const box = document.getElementById('messages');
        const row = document.createElement('div');
        row.className = 'msg-row bot';
        const chips = fallback.map(function(r) {
          return '<button class="suggestion-chip" onclick="sendHint(\'' + r.kw2 + '\')">' + r.kw2 + '</button>';
        }).join('');
        const safeText = text.replace(/'/g, "\'");
        const submitHtml = '<div class="submit-row"><button class="submit-btn" onclick="handleSubmitUnanswered(\'' + safeText + '\', this)">📩 Submit this question to the team</button></div>';
        row.innerHTML = '<div class="bubble">We don\'t have the answer for that question just yet. Please submit your question for our future improvement!' +
          (chips ? '<div class="suggestions"><span class="suggestions-label">Or try these</span>' + chips + '</div>' : '') +
          submitHtml + '</div>';
        box.appendChild(row);
        box.scrollTop = box.scrollHeight;
      }
    }, 900);
  }

  function sendHint(kw) {
    document.getElementById('userInput').value = kw;
    sendMessage();
  }

  // ── Init ─────────────────────────────────────────────────────
  loadKeywords();
</script>

</body>
</html>
